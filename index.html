<!doctype html>
<html lang="id" class="h-full antialiased">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Frontend web absensi sekolah untuk SMK Citra Negara dengan role siswa, walas, BK, dan admin." />
    <meta name="theme-color" content="#047857" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Preconnect: browser opens TCP/TLS to Google Fonts servers before CSS requests them -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts via <link> instead of CSS @import — loads in parallel with CSS, not sequentially -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" />
    <title>Absensi CN</title>
  </head>
  <body class="min-h-full bg-background text-foreground">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
